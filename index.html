<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>베타 테스트 종료 — 정식 출시 안내</title>
    <meta name="description" content="구연시 베타 테스트가 종료되었습니다. 정식 출시 버전으로 이동해 주세요. 저장 기록은 그대로 이어집니다." />
    <meta http-equiv="refresh" content="20; url=https://jonathanblackdoctor.github.io/happy-birthday-yummo/" />
    <style>
      :root {
        color-scheme: light;
        --pink: #f7c8d3;
        --pink-deep: #e98aa1;
        --ink: #2d2230;
        --ink-soft: #6a5c70;
        --bg: #fffafc;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
        line-height: 1.7;
      }
      .wrap {
        max-width: 560px;
        margin: 0 auto;
        padding: 64px 24px 80px;
        text-align: center;
      }
      .petal {
        font-size: 48px;
        margin-bottom: 8px;
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      h1 {
        font-size: 26px;
        margin: 0 0 24px;
        letter-spacing: -0.02em;
      }
      .lead {
        font-size: 17px;
        color: var(--ink-soft);
        margin: 0 0 28px;
      }
      .card {
        background: #fff;
        border: 1px solid var(--pink);
        border-radius: 16px;
        padding: 24px 22px;
        margin: 0 0 24px;
        text-align: left;
        box-shadow: 0 4px 16px rgba(233, 138, 161, 0.12);
      }
      .card p { margin: 0 0 12px; font-size: 15px; }
      .card p:last-child { margin-bottom: 0; }
      .cta {
        display: inline-block;
        background: var(--pink-deep);
        color: #fff;
        text-decoration: none;
        padding: 14px 32px;
        border-radius: 999px;
        font-weight: 600;
        font-size: 16px;
        letter-spacing: -0.01em;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        box-shadow: 0 4px 14px rgba(233, 138, 161, 0.35);
      }
      .cta:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(233, 138, 161, 0.45);
      }
      .note {
        margin-top: 28px;
        font-size: 13px;
        color: var(--ink-soft);
        line-height: 1.6;
      }
      .url {
        display: block;
        margin-top: 10px;
        font-size: 12px;
        color: var(--ink-soft);
        word-break: break-all;
      }
      .url a { color: var(--ink-soft); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="petal" aria-hidden="true">🌸</div>
      <h1>베타 테스트가 끝났어요</h1>
      <p class="lead">참여해 주셔서 진심으로 감사합니다.<br />여러분의 플레이 덕분에 정식 버전이 완성됐어요.</p>

      <div class="card">
        <p><strong>정식 버전이 출시되었습니다.</strong></p>
        <p>아래 버튼으로 이동하시면 <strong>이전 저장 기록 그대로</strong> 이어서 플레이하실 수 있습니다. (같은 브라우저에서 접속할 경우 자동으로 적용돼요.)</p>
      </div>

      <a class="cta" href="https://jonathanblackdoctor.github.io/happy-birthday-yummo/">정식 버전으로 이동 →</a>

      <p class="note">
        20초 후 자동으로 이동합니다.<br />
        이동되지 않으면 위 버튼을 눌러 주세요.
      </p>
      <span class="url">
        <a href="https://jonathanblackdoctor.github.io/happy-birthday-yummo/">https://jonathanblackdoctor.github.io/happy-birthday-yummo/</a>
      </span>
    </main>
  </body>
</html>
